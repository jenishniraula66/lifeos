<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="app">

<!-- Sidebar -->
<div class="sidebar">

<h2 class="logo">LifeOS</h2>

<ul class="nav">
<li data-page="dashboard" class="active">Dashboard</li>
<li data-page="expenses">Expenses</li>
<li data-page="tasks">Tasks</li>
<li data-page="notes">Notes</li>
<li data-page="habits">Habits</li>
</ul>

<div class="toggle-theme">
Toggle Theme
</div>

</div>

<!-- Main -->
<div class="main">

<!-- Dashboard -->
<div class="page active" id="dashboard">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Expenses</h3>
<p id="totalExpense">₹0</p>
</div>

<div class="card">
<h3>Tasks</h3>
<p id="taskCount">0</p>
</div>

<div class="card">
<h3>Habits</h3>
<p id="habitCount">0</p>
</div>

</div>

</div>

<!-- Expenses -->
<div class="page" id="expenses">

<h1>Expense Tracker</h1>

<div class="input-group">
<input type="text" id="expenseName" placeholder="Expense name">
<input type="number" id="expenseAmount" placeholder="Amount">
<button onclick="addExpense()">Add</button>
</div>

<ul id="expenseList"></ul>

</div>

<!-- Tasks -->
<div class="page" id="tasks">

<h1>Tasks</h1>

<div class="input-group">
<input type="text" id="taskInput" placeholder="New task">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<!-- Notes -->
<div class="page" id="notes">

<h1>Notes</h1>

<textarea id="noteInput" placeholder="Write notes..."></textarea>

<button onclick="saveNote()">Save</button>

<div id="notesList"></div>

</div>

<!-- Habits -->
<div class="page" id="habits">

<h1>Habits</h1>

<div class="input-group">
<input type="text" id="habitInput" placeholder="New Habit">
<button onclick="addHabit()">Add</button>
</div>

<ul id="habitList"></ul>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
